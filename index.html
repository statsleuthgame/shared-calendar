<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Our Calendar">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Our Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-screen" class="screen">
    <header id="app-header">
      <div class="header-brand">
        <span class="header-dot header-dot-1"></span>
        <span class="header-dot header-dot-2"></span>
        <h1>Our Calendar</h1>
      </div>
    </header>

    <!-- Loading State -->
    <div id="loading-state" class="view">
      <div class="skeleton-list">
        <div class="skeleton-bar skeleton-date"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-bar skeleton-date"></div>
        <div class="skeleton-card"></div>
      </div>
    </div>

    <!-- List View -->
    <section id="list-view" class="view hidden" role="region" aria-label="Event list">
      <div id="event-list">
        <div class="empty-state">
          <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
          <p>No upcoming events</p>
          <p class="empty-hint">Tap + to add one</p>
        </div>
      </div>
    </section>

    <!-- Calendar View -->
    <section id="calendar-view" class="view hidden" role="region" aria-label="Calendar">
      <div class="cal-header">
        <button id="cal-prev" class="btn-icon cal-nav" aria-label="Previous month">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h2 id="cal-month-label"></h2>
        <button id="cal-today" class="btn-today hidden">Today</button>
        <button id="cal-next" class="btn-icon cal-nav" aria-label="Next month">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="cal-grid" id="cal-grid">
        <div class="cal-weekdays">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div id="cal-days"></div>
      </div>
      <div id="cal-day-events">
        <div class="empty-state small">
          <svg class="empty-icon small" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <p>Tap a day to see events</p>
        </div>
      </div>
    </section>

    <!-- Tab Bar -->
    <nav class="tab-bar">
      <button class="tab active" data-tab="list-view" aria-label="List view">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>List</span>
        <span class="tab-indicator"></span>
      </button>
      <button class="tab" data-tab="calendar-view" aria-label="Calendar view">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendar</span>
        <span class="tab-indicator"></span>
      </button>
    </nav>

    <button id="add-btn" class="fab" aria-label="Add event">
      <svg class="fab-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- Add/Edit Event Modal -->
  <div id="event-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-handle"></div>
      <h2 id="modal-title">New Event</h2>
      <form id="event-form">
        <div class="form-field">
          <label class="field-label" for="event-name">Event Name</label>
          <input type="text" id="event-name" placeholder="What's happening?" required>
        </div>

        <fieldset class="form-field">
          <legend class="field-label">Date</legend>
          <div class="date-row">
            <input type="date" id="event-date" aria-label="Start date" required>
            <span class="date-separator">to</span>
            <input type="date" id="event-end-date" aria-label="End date">
          </div>
        </fieldset>

        <fieldset class="form-field">
          <legend class="field-label">Time</legend>
          <div class="time-row">
            <input type="time" id="event-time" aria-label="Event time">
            <label class="allday-toggle">
              <input type="checkbox" id="event-allday">
              <span class="allday-label">All Day</span>
            </label>
          </div>
        </fieldset>

        <fieldset class="form-field">
          <legend class="field-label">Who</legend>
          <div class="person-picker">
            <label class="person-option">
              <input type="radio" name="event-person" value="Cody" required>
              <span class="person-label cody">Cody</span>
            </label>
            <label class="person-option">
              <input type="radio" name="event-person" value="Stef">
              <span class="person-label stef">Stef</span>
            </label>
            <label class="person-option">
              <input type="radio" name="event-person" value="Both">
              <span class="person-label both">Both</span>
            </label>
            <label class="person-option">
              <input type="radio" name="event-person" value="Dogs">
              <span class="person-label dogs">T&M</span>
            </label>
          </div>
        </fieldset>

        <div class="form-field">
          <label class="field-label" for="event-notes">Notes</label>
          <textarea id="event-notes" placeholder="Optional" rows="3"></textarea>
        </div>
        <input type="hidden" id="event-id">
        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
          <button type="button" id="delete-btn" class="btn btn-danger hidden">Delete</button>
          <button type="submit" id="save-btn" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Custom Delete Confirm -->
  <div id="delete-confirm" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content confirm-content">
      <h2>Delete Event</h2>
      <p class="confirm-text">Are you sure you want to delete this event?</p>
      <div class="modal-actions">
        <button type="button" id="confirm-cancel" class="btn btn-secondary">Cancel</button>
        <button type="button" id="confirm-delete" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
