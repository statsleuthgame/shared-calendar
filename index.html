<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Our Calendar">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Our Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-screen" class="screen">
    <header>
      <h1>Our Calendar</h1>
    </header>

    <!-- List View -->
    <main id="list-view" class="view">
      <div id="event-list">
        <p class="empty-state">No upcoming events</p>
      </div>
    </main>

    <!-- Calendar View -->
    <main id="calendar-view" class="view hidden">
      <div class="cal-header">
        <button id="cal-prev" class="btn-icon cal-nav">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h2 id="cal-month-label"></h2>
        <button id="cal-next" class="btn-icon cal-nav">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="cal-grid">
        <div class="cal-weekdays">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div id="cal-days"></div>
      </div>
      <div id="cal-day-events">
        <p class="empty-state">Tap a day to see events</p>
      </div>
    </main>

    <!-- Tab Bar -->
    <nav class="tab-bar">
      <button class="tab active" data-tab="list-view">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>List</span>
      </button>
      <button class="tab" data-tab="calendar-view">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendar</span>
      </button>
    </nav>

    <button id="add-btn" class="fab" title="Add event">+</button>
  </div>

  <!-- Add/Edit Event Modal -->
  <div id="event-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modal-title">New Event</h2>
      <form id="event-form">
        <input type="text" id="event-name" placeholder="Event name" required>
        <div class="date-row">
          <input type="date" id="event-date" required>
          <span class="date-separator">to</span>
          <input type="date" id="event-end-date" placeholder="End date">
        </div>
        <input type="time" id="event-time" required>

        <div class="person-picker">
          <label class="person-option">
            <input type="radio" name="event-person" value="Cody" required>
            <span class="person-label cody">Cody</span>
          </label>
          <label class="person-option">
            <input type="radio" name="event-person" value="Stef">
            <span class="person-label stef">Stef</span>
          </label>
          <label class="person-option">
            <input type="radio" name="event-person" value="Both">
            <span class="person-label both">Both</span>
          </label>
        </div>

        <textarea id="event-notes" placeholder="Notes (optional)" rows="3"></textarea>
        <input type="hidden" id="event-id">
        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
          <button type="button" id="delete-btn" class="btn btn-danger hidden">Delete</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
